<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Notification Tracker</title>
  <link rel="stylesheet" href="design-system/index.css">
</head>
<body class="app">
  <header class="topbar">
    <a class="topbar__brand" href="/" data-path="/">Job Notification Tracker</a>
    <div class="topbar__nav-wrap">
      <nav id="topbar-nav" class="topbar__nav">
        <a class="nav-link" data-path="/dashboard" href="/dashboard">Dashboard</a>
        <a class="nav-link" data-path="/saved" href="/saved">Saved</a>
        <a class="nav-link" data-path="/digest" href="/digest">Digest</a>
        <a class="nav-link" data-path="/settings" href="/settings">Settings</a>
        <a class="nav-link" data-path="/proof" href="/proof">Proof</a>
      </nav>
    </div>
    <button type="button" class="topbar__menu-btn" id="topbar-menu-btn" aria-label="Open menu">
      <span class="topbar__menu-btn-icon"></span>
    </button>
  </header>

  <main class="main">
    <div id="root" class="route-view"></div>
  </main>

  <footer class="proof-footer">
    <ul class="proof-footer__list">
      <li class="proof-footer__item proof-footer__item--done">
        <span class="proof-footer__checkbox"></span>
        UI Built
      </li>
      <li class="proof-footer__item">
        <span class="proof-footer__checkbox"></span>
        Logic Working
      </li>
      <li class="proof-footer__item">
        <span class="proof-footer__checkbox"></span>
        Test Passed
      </li>
      <li class="proof-footer__item">
        <span class="proof-footer__checkbox"></span>
        Deployed
      </li>
    </ul>
  </footer>

  <script src="js/router.js"></script>
</body>
</html>
